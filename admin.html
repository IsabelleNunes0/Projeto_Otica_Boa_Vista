<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Administrativo</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
background:#f4f6f9;
font-family: 'Poppins', sans-serif;
}

/* NAVBAR */
.navbar{
background:#0b3c5d;
}

.navbar-brand{
font-weight:600;
}

/* CARD */
.card-admin{
border:none;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

/* TITULO */
.titulo{
font-weight:600;
}

/* BOTÃO */
.btn-sair{
background:#dc3545;
color:white;
border:none;
border-radius:20px;
padding:6px 16px;
}

/* TABELA */
.table thead{
background:#0b3c5d;
color:white;
}

.table{
border-radius:10px;
overflow:hidden;
}

/* STATUS */
.status{
padding:5px 10px;
border-radius:20px;
font-size:12px;
}

.status-agendado{
background:#d1e7dd;
color:#0f5132;
}

</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark">
<div class="container d-flex justify-content-between">

<span class="navbar-brand">
<i class="fa-solid fa-user-shield"></i> Painel Admin
</span>

<button class="btn-sair" onclick="logout()">
<i class="fa-solid fa-right-from-bracket"></i> Sair
</button>

</div>
</nav>

<!-- CONTEÚDO -->
<div class="container mt-5">

<div class="card card-admin p-4">

<h4 class="titulo mb-4">
<i class="fa-solid fa-calendar-check"></i> Agendamentos
</h4>

<div class="table-responsive">

<table class="table table-hover align-middle">

<thead>
<tr>
<th>Nome</th>
<th>Data</th>
<th>Horário</th>
<th>Telefone</th>
<th>1ª Consulta</th>
<th>Observações</th>
<th>Status</th>
</tr>
</thead>

<tbody id="tabela">
<tr>
<td colspan="7" class="text-center">Carregando...</td>
</tr>
</tbody>

</table>

</div>

</div>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
