<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Agendamento | Ótica Boa Vista</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#f4f6f9;
}

.navbar{
background:#0b3c5d;
}

.navbar-brand{
font-weight:bold;
font-size:22px;
}

.agendamento-container{
max-width:700px;
margin:auto;
margin-top:60px;
margin-bottom:80px;
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.titulo{
text-align:center;
margin-bottom:30px;
}

.btn-agendar{
background:#0b3c5d;
color:white;
padding:12px 30px;
border:none;
border-radius:30px;
font-weight:bold;
transition:0.3s;
}

.btn-agendar:hover{
background:#082b44;
transform:scale(1.05);
}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container">

<a class="navbar-brand" href="index.html">Ótica Boa Vista</a>

<div class="navbar-nav ms-auto">
<a class="nav-link" href="index.html">Início</a>
<a class="nav-link active">Agendamento</a>
</div>

</div>
</nav>

<div class="agendamento-container">

<div class="titulo">
<h2>Agendar exame de vista</h2>
<p>Preencha os dados abaixo para marcar sua consulta</p>
</div>

<form id="formAgendamento">

<div class="mb-3">
<label class="form-label">Nome completo</label>
<input type="text" class="form-control" id="nome" required>
</div>

<div class="mb-3">
<label class="form-label">WhatsApp</label>
<input type="tel" class="form-control" id="telefone" placeholder="(61) 99999-9999" required>
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" class="form-control" id="email">
</div>

<div class="mb-3">
<label class="form-label">Data da consulta</label>
<input type="date" class="form-control" id="data" required>
</div>

<div class="mb-3">
<label class="form-label">Horário disponível</label>
<select class="form-control" id="horario" required>
<option value="">Selecione</option>
</select>
</div>

<div class="mb-3">
<label class="form-label">Primeira consulta?</label>
<select class="form-control" id="primeira">
<option>Sim</option>
<option>Não</option>
</select>
</div>

<div class="mb-3">
<label class="form-label">Observações</label>
<textarea class="form-control" id="obs"></textarea>
</div>

<div class="text-center">
<button type="submit" class="btn-agendar" id="btnAgendar">
<i class="fa-solid fa-calendar-check"></i>
Confirmar Agendamento
</button>
</div>

</form>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
query,
where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAaAVwPKDb7DohdTU1GZB5bVYVcAMQ5RkI",
authDomain: "otica-boa-vista-7b393.firebaseapp.com",
projectId: "otica-boa-vista-7b393",
storageBucket: "otica-boa-vista-7b393.firebasestorage.app",
messagingSenderId: "211281094314",
appId: "1:211281094314:web:ae994d4b6f9d801e7cd2d3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const inputData = document.getElementById("data");
const selectHorario = document.getElementById("horario");

const horariosSemana = [
"08:00","08:20","08:40","09:00","09:20","09:40",
"10:00","10:20","10:40","11:00","11:20","11:40",
"13:00","13:20","13:40","14:00","14:20","14:40",
"15:00","15:20","15:40","16:00","16:20","16:40"
];

const horariosSabado = [
"08:00","08:20","08:40","09:00","09:20","09:40",
"10:00","10:20","10:40","11:00","11:20","11:40",
"12:00","12:20","12:40"
];

const hoje = new Date().toISOString().split("T")[0];
inputData.setAttribute("min", hoje);

inputData.addEventListener("change", verificarHorarios);

async function verificarHorarios(){

const dataSelecionada = inputData.value;
const dataObj = new Date(dataSelecionada + "T00:00");
const diaSemana = dataObj.getDay();

if(diaSemana === 0){
alert("A clínica não abre aos domingos.");
inputData.value = "";
selectHorario.innerHTML = '<option value="">Selecione</option>';
return;
}

let horarios = diaSemana === 6 ? horariosSabado : horariosSemana;

selectHorario.innerHTML = '<option value="">Selecione</option>';

horarios.forEach(h=>{
let opt = document.createElement("option");
opt.value = h;
opt.textContent = h;
selectHorario.appendChild(opt);
});

const q = query(
collection(db,"agendamentos"),
where("data","==",dataSelecionada)
);

const querySnapshot = await getDocs(q);

const contagem = {};

querySnapshot.forEach(doc=>{
const h = doc.data().horario;
contagem[h] = (contagem[h] || 0) + 1;
});

const agora = new Date();
const hoje = agora.toISOString().split("T")[0];
const horaAtual = agora.getHours();
const minutoAtual = agora.getMinutes();

for(let option of selectHorario.options){

if(option.value === "") continue;

const [hora,minuto] = option.value.split(":").map(Number);

// 🔥 REGRA 2 PESSOAS
if(contagem[option.value] >= 2){
option.disabled = true;
}

// BLOQUEIA HORÁRIO PASSADO
if(dataSelecionada === hoje){
if(hora < horaAtual || (hora === horaAtual && minuto <= minutoAtual)){
option.disabled = true;
}
}

}

}

// FORMATA TELEFONE
const telefoneInput = document.getElementById("telefone");

telefoneInput.addEventListener("input", function(e){
let v = e.target.value.replace(/\D/g,"");
if(v.length > 11) v = v.slice(0,11);

if(v.length > 6){
v = `(${v.slice(0,2)}) ${v.slice(2,7)}-${v.slice(7)}`;
}else if(v.length > 2){
v = `(${v.slice(0,2)}) ${v.slice(2)}`;
}

e.target.value = v;
});

const form = document.getElementById("formAgendamento");
const btn = document.getElementById("btnAgendar");

form.addEventListener("submit", async (e)=>{

e.preventDefault();

btn.innerHTML="Agendando...";
btn.disabled=true;

const nome = document.getElementById("nome").value;
const telefone = document.getElementById("telefone").value;
const email = document.getElementById("email").value;
const data = document.getElementById("data").value;
const horario = document.getElementById("horario").value;
const primeira = document.getElementById("primeira").value;
const obs = document.getElementById("obs").value;

try{

// 🔥 REGRA 2 PESSOAS NO BACK
const q2 = query(
collection(db,"agendamentos"),
where("data","==",data),
where("horario","==",horario)
);

const check = await getDocs(q2);

if(check.size >= 2){

alert("Este horário já atingiu o limite de 2 pessoas.");

btn.innerHTML="Confirmar Agendamento";
btn.disabled=false;

return;

}

await addDoc(collection(db,"agendamentos"),{
nome,
telefone,
email,
data,
horario,
primeiraConsulta:primeira,
observacoes:obs,
status:"agendado"
});

alert("Agendamento realizado com sucesso!");
form.reset();
verificarHorarios();

}catch(error){
alert("Erro ao realizar agendamento");
console.error(error);
}

btn.innerHTML="Confirmar Agendamento";
btn.disabled=false;

});

</script>

</body>
</html>
